# --------------------------------------------------------------------------
# Example nginx config for the multi-tenant demo.
#
# Layout: ONE virtual host that matches both the apex (example.com) and any
# tenant subdomain (alpha.example.com, beta.example.com, ...). The same
# vanilla-JS frontend is served from `root`; nginx proxies the API/admin/
# static paths to gunicorn. Django's TenantMainMiddleware looks at the Host
# header to pick the right schema, so nginx just needs to forward Host as-is.
#
# Replace example.com with your real apex domain and adjust the paths.
# --------------------------------------------------------------------------

upstream tenants_back {
    # Path matches `bin/gunicorn_start.sh` (supervisor-style). If you instead
    # use the systemd setup from deploy/gunicorn.service, switch this to
    # `unix:/run/tenants_back.sock`.
    server unix:/home/webmaster/tenants_back/run/gunicorn.sock fail_timeout=0;
    # ...or, for a TCP upstream, swap the line above for:
    # server 127.0.0.1:8000 fail_timeout=0;
}

# Redirect every HTTP request (apex + subdomains) to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name example.com *.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com *.example.com;

    # TLS — point these at your real certificate (Let's Encrypt issues a
    # wildcard for *.example.com via DNS-01).
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # ----------------------------------------------------------------------
    # Static files served by Django (admin assets, DRF browsable API, ...).
    # Run `python manage.py collectstatic` once after deploy.
    # ----------------------------------------------------------------------
    location /static/ {
        alias /srv/tenants_back/staticfiles/;
        access_log off;
        expires 7d;
    }

    # ----------------------------------------------------------------------
    # Django admin + API → gunicorn. Multi-tenancy is host-based, so we MUST
    # forward the original Host header — that's what TenantMainMiddleware
    # uses to pick the schema.
    # ----------------------------------------------------------------------
    location ~ ^/(api|admin)/ {
        proxy_pass         http://tenants_back;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ----------------------------------------------------------------------
    # Everything else → the SPA. Single-page app: any unknown path falls back
    # to index.html so deep-links work.
    # ----------------------------------------------------------------------
    location / {
        root /srv/tenants_front;
        try_files $uri $uri/ /index.html;
    }
}