# --------------------------------------------------------------------------
# Example nginx config for the multi-tenant demo.
#
# Layout:
#   :443  → SPA (frontend) only. Будь-який шлях віддається як index.html
#           (SPA-фолбек). Django сюди не проксується — все API/admin живе
#           на :8000.
#   :8000 → publicly exposed Django backend: /api/ + /admin/ + /static/.
#           Same TLS cert. SPA on :443 calls /api here; external clients
#           (curl / mobile / 3rd party) too. Operators use /admin/ here.
#
# Both ports use the same gunicorn UNIX socket (тільки :8000 його зараз
# реально торкається). Multi-tenancy is host-based, so we always forward
# Host as-is — TenantMainMiddleware uses it to pick the schema.
# --------------------------------------------------------------------------

upstream tenants_back {
    # Path matches `bin/gunicorn_start.sh` (supervisor-style). If you instead
    # use the systemd setup from deploy/gunicorn.service, switch this to
    # `unix:/run/tenants_back.sock`.
    server unix:/home/ubuntu/tenants_back/run/gunicorn.sock fail_timeout=0;
    # ...or, for a TCP upstream, swap the line above for:
    # server 127.0.0.1:8001 fail_timeout=0;
}

# Reusable proxy block — included by both :443 and :8000 server sections so
# headers stay identical.
# (nginx doesn't have a literal "include block of directives" inside server
# scope; we just repeat them in each `location` below.)

# ----------------------------------------------------------------------
# 80 → 443 redirect for the frontend host.
# ----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name test-multitenants.isi-technology.com *.test-multitenants.isi-technology.com;
    return 301 https://$host$request_uri;
}

# ----------------------------------------------------------------------
# Frontend on :443.
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test-multitenants.isi-technology.com *.test-multitenants.isi-technology.com;

    ssl_certificate     /etc/letsencrypt/live/test-multitenants.isi-technology.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-multitenants.isi-technology.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # SPA: будь-який невідомий шлях віддаємо як index.html.
    # Django (admin / api / static) сюди свідомо не прокситься — усе на :8000.
    location / {
        root /home/ubuntu/tenants_front;
        try_files $uri /index.html =404;
    }
}

# ----------------------------------------------------------------------
# Public API on :8000.
#   - SPA з :443 кличе сюди (cross-origin → CORS у Django відкритий регексом).
#   - Зовнішні клієнти теж ходять сюди: https://alpha.example.com:8000/api/...
# ----------------------------------------------------------------------
server {
    listen 8000 ssl http2;
    listen [::]:8000 ssl http2;
    server_name test-multitenants.isi-technology.com *.test-multitenants.isi-technology.com;

    # Той самий wildcard-сертифікат — нічого додатково випускати не треба.
    ssl_certificate     /etc/letsencrypt/live/test-multitenants.isi-technology.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-multitenants.isi-technology.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # Усе, що не /api/, не /admin/, не /static/ — 404 (не віддаємо SPA з цього порту).
    location / {
        return 404;
    }

    location /api/ {
        proxy_pass         http://tenants_back;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # Django admin живе тільки тут: <host>:8000/admin/.
    # CSRF: у settings_local.py CSRF_TRUSTED_ORIGINS має містити
    #   "https://example.com:8000" + "https://*.example.com:8000".
    location /admin/ {
        proxy_pass         http://tenants_back;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # Статика для адмінки (CSS/JS) — без неї сторінки логіну/моделей виглядають голо.
    location /static/ {
        alias /home/ubuntu/tenants_back/staticfiles/;
        access_log off;
        expires 7d;
    }
}